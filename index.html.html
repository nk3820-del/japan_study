<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일본어 마스터 (풀버전)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        .jp-text { font-family: 'Noto Sans JP', sans-serif; }
    </style>
</head>
<body class="bg-slate-800 min-h-screen flex justify-center items-center font-sans">

    <!-- 스마트폰 형태 UI -->
    <div class="relative w-full max-w-[400px] h-[100dvh] sm:h-[800px] sm:rounded-[2.5rem] sm:border-[10px] border-slate-900 bg-slate-50 shadow-2xl flex flex-col overflow-hidden">
        
        <!-- 상단 헤더 -->
        <div class="bg-indigo-600 pt-6 pb-4 px-4 shadow-md z-10 shrink-0">
            <h1 class="text-xl font-extrabold text-white mb-4 text-center tracking-tight">🇯🇵 일본어 마스터 (풀버전)</h1>
            
            <div class="flex flex-wrap gap-2 justify-center" id="stage-buttons">
                <button onclick="loadStage(0)" class="px-3 py-1.5 bg-yellow-400 text-indigo-900 text-xs font-bold rounded-lg shadow-sm transition border-2 border-transparent w-full mb-1">⭐ 0단계: 그림 암기장 (전체 92자)</button>
                <button onclick="loadStage(1)" class="px-3 py-1.5 bg-indigo-400 text-white text-xs font-bold rounded-lg shadow-sm transition hover:bg-indigo-500">1단계</button>
                <button onclick="loadStage(2)" class="px-3 py-1.5 bg-indigo-400 text-white text-xs font-bold rounded-lg shadow-sm transition hover:bg-indigo-500">2단계</button>
                <button onclick="loadStage(3)" class="px-3 py-1.5 bg-indigo-400 text-white text-xs font-bold rounded-lg shadow-sm transition hover:bg-indigo-500">3단계</button>
                <button onclick="loadStage(4)" class="px-3 py-1.5 bg-indigo-400 text-white text-xs font-bold rounded-lg shadow-sm transition hover:bg-indigo-500">4단계</button>
                <button onclick="loadStage(5)" class="px-3 py-1.5 bg-indigo-400 text-white text-xs font-bold rounded-lg shadow-sm transition hover:bg-indigo-500">5단계</button>
            </div>
        </div>

        <!-- 메인 콘텐츠 영역 -->
        <div class="flex-grow p-4 overflow-y-auto relative flex flex-col">
            
            <!-- 0단계: 암기장 -->
            <div id="study-container" class="hidden flex-col h-full">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-sm font-bold text-yellow-600 bg-yellow-100 px-3 py-1 rounded-md">문자 연상 학습</h2>
                    <span id="study-progress" class="text-sm font-semibold text-slate-400"></span>
                </div>

                <div class="flex-grow flex flex-col justify-center items-center bg-white rounded-3xl shadow-sm border border-slate-200 p-6 text-center mb-4 relative">
                    <span id="study-type" class="px-3 py-1 bg-slate-100 text-slate-500 text-xs font-bold rounded-full mb-4"></span>
                    <div id="study-img" class="text-7xl mb-2 drop-shadow-md"></div>
                    <h3 id="study-char" class="jp-text text-8xl font-black text-slate-800 mb-1"></h3>
                    <p id="study-pronounce" class="text-2xl font-bold text-indigo-600 mb-6"></p>
                    <div class="bg-indigo-50 w-full p-4 rounded-xl border border-indigo-100 min-h-[80px] flex flex-col justify-center">
                        <p class="text-xs text-indigo-400 mb-1 font-bold">💡 이렇게 외워보세요</p>
                        <p id="study-mnemonic" class="text-sm font-semibold text-slate-700 leading-relaxed"></p>
                    </div>
                </div>

                <div class="flex gap-2 mt-auto pb-4 shrink-0">
                    <button onclick="prevStudyCard()" class="flex-1 py-4 bg-slate-200 text-slate-700 font-bold rounded-2xl shadow-sm active:bg-slate-300">◀ 이전</button>
                    <button onclick="nextStudyCard()" class="flex-1 py-4 bg-yellow-400 text-indigo-900 font-bold rounded-2xl shadow-sm active:bg-yellow-500">다음 ▶</button>
                </div>
            </div>

            <!-- 1~5단계: 퀴즈 -->
            <div id="quiz-container" class="hidden flex-col h-full">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="current-stage-title" class="text-sm font-bold text-indigo-600 bg-indigo-100 px-3 py-1 rounded-md"></h2>
                    <span id="quiz-progress" class="text-sm font-semibold text-slate-400"></span>
                </div>

                <div class="flex-grow flex items-center justify-center py-8 mb-4 bg-white rounded-3xl shadow-sm border border-slate-200 px-4">
                    <p id="question-text" class="jp-text text-center text-6xl font-bold text-slate-800 leading-tight"></p>
                </div>

                <div class="mt-auto pb-4 shrink-0">
                    <div id="input-area" class="flex flex-col gap-2">
                        <input type="text" id="answer-input" placeholder="발음 입력 (예: 카)" 
                            class="w-full px-4 py-4 bg-white border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 text-base text-center transition shadow-sm"
                            onkeypress="handleKeyPress(event)" autocomplete="off">
                        <button onclick="checkAnswer()" id="submit-btn"
                            class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl active:bg-indigo-700 shadow-md transition text-base">
                            정답 확인
                        </button>
                    </div>

                    <div id="feedback-area" class="hidden flex-col gap-2">
                        <div id="feedback-box" class="p-4 rounded-xl text-center">
                            <div class="text-3xl mb-1" id="feedback-icon"></div>
                            <h3 id="feedback-title" class="text-lg font-bold mb-2"></h3>
                            <div class="bg-white/50 p-3 rounded-lg inline-block text-left w-full">
                                <p class="text-xs opacity-70">발음</p>
                                <p class="font-bold text-base mb-1" id="feedback-p"></p>
                                <p class="text-xs opacity-70">뜻</p>
                                <p class="font-bold text-base" id="feedback-q"></p>
                            </div>
                        </div>
                        <button onclick="nextQuestion()" id="next-btn"
                            class="w-full py-4 bg-slate-800 text-white font-bold rounded-xl active:bg-slate-900 shadow-md transition text-base">
                            다음 문제
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

            ],

                { q: "카", a: "カ", p: "ka" }, { q: "키", a: "キ", p: "ki" }, { q: "쿠", a: "ク", p: "ku" }, { q: "케", a: "ケ", p: "ke" }, { q: "코", a: "コ", p: "ko" },

                { q: "마", a: "マ", p: "ma" }, { q: "미", a: "ミ", p: "mi" }, { q: "무", a: "ム", p: "mu" }, { q: "메", a: "メ", p: "me" }, { q: "모", a: "モ", p: "mo" },

            ]
        };

        const stageTitles = {
            1: "1단계: 히라가나 46자 랜덤퀴즈", 2: "2단계: 가타카나 46자 랜덤퀴즈",
            3: "3단계: 여행 초급", 4: "4단계: 여행 중급", 5: "5단계: 여행 고급"
        };

        let currentMode = null;
        let currentStage = null;
        let studyIndex = 0;
        let currentQuizList = [];
        let quizIndex = 0;
        let isAnswered = false;

        window.onload = function() { loadStage(0); };

        function loadStage(stageNum) {
            const buttons = document.querySelectorAll('#stage-buttons button');
            buttons.forEach((btn, index) => {
                if (index === stageNum) {
                    btn.classList.add('ring-2', 'ring-white', 'scale-105');
                    btn.classList.remove('opacity-80');
                } else {
                    btn.classList.remove('ring-2', 'ring-white', 'scale-105');
                    btn.classList.add('opacity-80');
                }
            });

            if (stageNum === 0) {
                currentMode = 'study';
                document.getElementById('quiz-container').classList.add('hidden');
                document.getElementById('study-container').classList.remove('hidden');
                document.getElementById('study-container').classList.add('flex');
                studyIndex = 0;
                showStudyCard();
            } else {
                currentMode = 'quiz';
                currentStage = stageNum;
                document.getElementById('study-container').classList.add('hidden');
                document.getElementById('study-container').classList.remove('flex');
                document.getElementById('quiz-container').classList.remove('hidden');
                document.getElementById('quiz-container').classList.add('flex');
                
                document.getElementById('current-stage-title').innerText = stageTitles[stageNum];
                currentQuizList = shuffleArray([...wordData[stageNum]]);
                quizIndex = 0;
                showQuestion();
            }
        }

        function showStudyCard() {
            const data = studyData[studyIndex];
            document.getElementById('study-progress').innerText = `${studyIndex + 1} / ${studyData.length}`;
            document.getElementById('study-type').innerText = data.type;
            document.getElementById('study-img').innerText = data.img;
            document.getElementById('study-char').innerText = data.char;
            document.getElementById('study-pronounce').innerText = data.p;
            document.getElementById('study-mnemonic').innerText = data.mnemonic;
        }

        function nextStudyCard() {
            studyIndex = (studyIndex + 1) % studyData.length;
            showStudyCard();
        }

        function prevStudyCard() {
            studyIndex = (studyIndex - 1 + studyData.length) % studyData.length;
            showStudyCard();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function normalizeString(str) {
            return str.replace(/[\s\-\.\?\!\,]/g, '').toLowerCase();
        }

        function showQuestion() {
            isAnswered = false;
            const currentWord = currentQuizList[quizIndex];
            document.getElementById('quiz-progress').innerText = `${quizIndex + 1} / ${currentQuizList.length}`;
            
            const qText = document.getElementById('question-text');
            qText.innerText = currentWord.a;
            qText.className = currentWord.a.length > 8 
                ? "jp-text text-center text-3xl font-bold text-slate-800 leading-tight" 
                : "jp-text text-center text-6xl font-bold text-slate-800 leading-tight";
            
            const answerInput = document.getElementById('answer-input');
            answerInput.value = '';
            answerInput.disabled = false;
            
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('feedback-area').classList.remove('flex');
            answerInput.focus();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                if (currentMode === 'quiz') {
                    !isAnswered ? checkAnswer() : nextQuestion();
                }
            }
        }

        function checkAnswer() {
            const answerInput = document.getElementById('answer-input');
            const userAnswer = normalizeString(answerInput.value);
            
            if (!userAnswer) {
                answerInput.classList.add('border-red-400');
                setTimeout(() => answerInput.classList.remove('border-red-400'), 500);
                return;
            }

            isAnswered = true;
            answerInput.disabled = true;
            document.getElementById('input-area').classList.add('hidden');
            const feedbackArea = document.getElementById('feedback-area');
            feedbackArea.classList.remove('hidden');
            feedbackArea.classList.add('flex');

            const currentWord = currentQuizList[quizIndex];
            const isCorrect = (userAnswer === normalizeString(currentWord.p)) || (userAnswer === normalizeString(currentWord.q));

            const fBox = document.getElementById('feedback-box');
            if (isCorrect) {
                fBox.className = "p-4 rounded-xl text-center bg-green-100 text-green-800 border-2 border-green-200";
                document.getElementById('feedback-icon').innerText = "🎉";
                document.getElementById('feedback-title').innerText = "정답입니다!";
            } else {
                fBox.className = "p-4 rounded-xl text-center bg-red-100 text-red-800 border-2 border-red-200";
                document.getElementById('feedback-icon').innerText = "💡";
                document.getElementById('feedback-title').innerText = "오답입니다.";
            }

            document.getElementById('feedback-p').innerText = currentWord.p;
            document.getElementById('feedback-q').innerText = currentWord.q;
            
            setTimeout(() => document.getElementById('next-btn').focus(), 100);
        }

        function nextQuestion() {
            quizIndex++;
            if (quizIndex >= currentQuizList.length) {
                quizIndex = 0;
                currentQuizList = shuffleArray([...wordData[currentStage]]);
            }
            showQuestion();
        }
